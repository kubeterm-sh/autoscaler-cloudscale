{{- if .Values.machineconfig.enabled }}
{{- if and (not .Values.machineconfig.content) (not .Values.machineconfig.existingSecret) }}
{{ fail "machineconfig.enabled is true but neither machineconfig.content nor machineconfig.existingSecret is set" }}
{{- end }}
{{- end }}
{{- if and .Values.machineconfig.enabled .Values.machineconfig.content (not .Values.machineconfig.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "autoscaler-cloudscale.machineconfigSecretName" . }}
  labels:
    {{- include "autoscaler-cloudscale.labels" . | nindent 4 }}
type: Opaque
stringData:
  machineconfig.yaml: |
    {{- .Values.machineconfig.content | nindent 4 }}
{{- end }}
