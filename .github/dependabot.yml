version: 2
updates:
  # Go modules
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
    cooldown:
      default-days: 7
      semver-major-days: 7
    labels: ["dependencies", "go"]
    open-pull-requests-limit: 10
    groups:
      go-minor-patch:
        update-types: [minor, patch]

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
      semver-major-days: 7
    labels: ["dependencies", "ci"]
    groups:
      actions:
        patterns: ["*"]

  # Docker
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
      semver-major-days: 7
    labels: ["dependencies", "docker"]
